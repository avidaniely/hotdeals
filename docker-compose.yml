services:
  hotdeals-api:
    image: mcr.microsoft.com/playwright/node:20-jammy
    container_name: hotdeals-api
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --omit=dev && node index.js"
    volumes:
      - ./server:/app
      - hotdeals-uploads:/app/uploads
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    networks:
      - webapp_webapp-net

volumes:
  hotdeals-uploads:

networks:
  webapp_webapp-net:
    external: true
